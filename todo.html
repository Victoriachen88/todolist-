<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>待办清单</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --blue: #6B8DD6;
      --blue-dark: #5a7bc7;
      --bg: #F2F3F5;
      --card-grad: linear-gradient(135deg, #E8EDF7 0%, #E4E9F5 60%, #E0E6F3 100%);
    }

    body {
      background: var(--bg);
      color: #222;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
        "Helvetica Neue", Arial, "PingFang SC", "Microsoft YaHei", sans-serif;
      line-height: 1.5;
    }

    /* ===== 整体网页布局 ===== */
    .layout {
      max-width: 1080px;
      margin: 0 auto;
      display: flex;
      gap: 20px;
      padding: 22px;
      align-items: flex-start;
    }

    /* ===== 左侧固定侧边栏 ===== */
    .sidebar {
      width: 230px;
      flex-shrink: 0;
      background: #fff;
      border-radius: 18px;
      padding: 18px 14px;
      position: sticky;
      top: 22px;
      box-shadow: 0 1px 4px rgba(0,0,0,.04);
    }

    .brand {
      font-size: 20px;
      font-weight: 800;
      padding: 4px 10px 14px;
      letter-spacing: -.3px;
    }
    .brand .dot { color: var(--blue); }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      border-radius: 10px;
      cursor: pointer;
      font-size: 14.5px;
      font-weight: 600;
      color: #555;
      margin-bottom: 2px;
      position: relative;
      transition: background .12s;
    }
    .nav-item:hover { background: #f4f6fa; }
    .nav-item.active { background: #eef2fb; color: var(--blue); }
    .nav-item .ni-ico { font-size: 17px; width: 20px; text-align: center; }

    .nav-badge {
      margin-left: auto;
      background: var(--blue); color: #fff;
      font-size: 10px; font-weight: 700;
      min-width: 18px; height: 18px;
      border-radius: 9px;
      display: flex; align-items: center; justify-content: center;
      padding: 0 5px;
    }

    .side-divider {
      height: 1px; background: #eee;
      margin: 12px 8px;
    }

    .side-label {
      font-size: 11px; font-weight: 700;
      color: #bbb; text-transform: uppercase;
      letter-spacing: 1px;
      padding: 4px 12px 8px;
    }

    /* 我的列表项 */
    .cat-nav {
      display: flex; align-items: center; gap: 8px;
      padding: 8px 12px; border-radius: 10px;
      cursor: pointer; font-size: 14px; color: #444;
      margin-bottom: 1px;
    }
    .cat-nav:hover { background: #f4f6fa; }
    .cat-nav.active { background: #eef2fb; color: var(--blue); font-weight: 600; }
    .cat-nav .cn-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .cat-nav .cn-num { font-size: 12px; color: #bbb; }

    .new-cat-btn {
      display: flex; align-items: center; gap: 8px;
      width: 100%; margin-top: 8px;
      border: 1.5px dashed #d0dae8; background: #fff;
      border-radius: 10px; padding: 9px 12px;
      color: var(--blue); font-weight: 600; font-size: 13.5px;
      font-family: inherit; cursor: pointer;
    }
    .new-cat-btn:hover { background: #f7f9fd; }

    /* ===== 右侧主内容区 ===== */
    .content { flex: 1; min-width: 0; }

    .content-head {
      display: flex; align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
      padding: 0 2px;
    }
    .content-title { font-size: 22px; font-weight: 800; }
    .head-btn {
      border: none; background: var(--blue); color: #fff;
      border-radius: 10px; padding: 9px 16px;
      font-size: 14px; font-weight: 600; font-family: inherit;
      cursor: pointer;
    }
    .head-btn:hover { background: var(--blue-dark); }

    /* 全部视图：分类卡片网格 */
    .all-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 16px;
      align-items: start;
    }

    /* ===== 分类圆角卡片 ===== */
    .cat-card {
      border-radius: 16px;
      overflow: hidden;
      background: var(--card-grad);
    }
    .card-head {
      display: flex; align-items: center;
      padding: 14px 16px 10px; gap: 9px;
    }
    .card-icon { font-size: 17px; opacity: .6; }
    .card-name { flex: 1; font-size: 16px; font-weight: 700; color: #333; }
    .card-count { font-size: 13.5px; font-weight: 600; color: #667; }
    .card-arrow { font-size: 13px; color: #99a; }

    .task-list { padding: 0 14px 6px; }

    .t-row {
      display: flex; align-items: flex-start; gap: 10px;
      padding: 9px 4px;
      border-bottom: 1px solid rgba(160,170,190,.18);
    }
    .t-row:last-child { border-bottom: none; }

    .radio {
      width: 20px; height: 20px;
      border: 1.8px solid #8896AB; border-radius: 50%;
      flex-shrink: 0; margin-top: 2px; cursor: pointer;
      position: relative; transition: all .15s;
    }
    .radio.checked { background: var(--blue); border-color: var(--blue); }
    .radio.checked::after {
      content: ""; position: absolute;
      left: 6px; top: 2px; width: 5px; height: 10px;
      border: solid #fff; border-width: 0 2.2px 2.2px 0;
      transform: rotate(45deg);
    }

    .t-body { flex: 1; min-width: 0; }
    .t-title { font-size: 15px; font-weight: 500; color: #222; word-break: break-all; line-height: 1.35; }
    .t-sub { font-size: 11.5px; color: #99a; word-break: break-all; margin-top: 2px; line-height: 1.3; }
    .t-row.done .t-title { text-decoration: line-through; color: #bbb; }
    .t-row.done .t-sub { color: #ddd; }

    .t-right { flex-shrink: 0; display: flex; align-items: center; gap: 2px; }
    .star-btn {
      border: none; background: none; font-size: 19px; line-height: 1;
      cursor: pointer; color: #c8d0dc; padding: 0 2px;
    }
    .star-btn.fav { color: var(--blue); }
    .del-btn {
      border: none; background: none; color: #ccc; font-size: 17px;
      line-height: 1; cursor: pointer; padding: 0 2px;
    }
    .del-btn:hover { color: #e06666; }

    /* 卡片底部添加待办 */
    .add-task-btn {
      display: block; width: calc(100% - 28px);
      margin: 8px auto 12px; border: none; border-radius: 10px;
      background: rgba(255,255,255,.65); color: var(--blue);
      font-size: 14px; font-weight: 600; font-family: inherit;
      padding: 9px 0; cursor: pointer; letter-spacing: .5px;
    }
    .add-task-btn:hover { background: rgba(255,255,255,.85); }

    .add-input-wrap { display: none; padding: 0 14px 12px; }
    .add-input-wrap.show { display: block; }
    .add-input, .add-note {
      width: 100%; border: 1.5px solid #c8d4e6; border-radius: 10px;
      padding: 9px 12px; font-size: 14px; font-family: inherit;
      outline: none; background: #fff; margin-bottom: 6px;
    }
    .add-note { font-size: 12.5px; }
    .add-input:focus, .add-note:focus { border-color: var(--blue); }
    .add-confirm { display: flex; gap: 8px; justify-content: flex-end; }
    .add-confirm button {
      border: none; border-radius: 8px; padding: 7px 16px;
      font-size: 13px; font-family: inherit; font-weight: 600; cursor: pointer;
    }
    .btn-ok { background: var(--blue); color: #fff; }
    .btn-cancel { background: #eaeaea; color: #777; }

    /* 添加列表大卡片 */
    .new-list-card {
      border-radius: 16px; border: 2px dashed #d0dae8; background: #fff;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 36px 0; cursor: pointer; transition: border-color .15s;
    }
    .new-list-card:hover { border-color: #aabbcc; }
    .new-list-card .plus-big {
      width: 42px; height: 42px; border-radius: 50%;
      background: var(--blue); color: #fff; font-size: 24px;
      display: flex; align-items: center; justify-content: center; margin-bottom: 10px;
    }
    .new-list-card span { font-size: 15px; font-weight: 600; color: var(--blue); }

    /* 设置页 */
    .settings-box {
      background: #fff; border-radius: 16px; padding: 24px;
      color: #666; font-size: 14px; line-height: 2;
    }
    .settings-box button {
      margin-top: 12px; padding: 10px 20px; border: none;
      border-radius: 10px; background: var(--blue); color: #fff;
      font-family: inherit; font-weight: 600; cursor: pointer;
    }

    .empty-hint { text-align: center; padding: 60px 0; color: #ccc; font-size: 14px; }

    /* 分组标题（计划页） */
    .section-title {
      padding: 16px 4px 8px; font-size: 13px; font-weight: 700;
      letter-spacing: 1px;
    }
    .plan-row {
      background: #fff; border-radius: 12px; padding: 12px 14px;
      display: flex; align-items: center; gap: 12px; margin-bottom: 8px;
    }
    .plan-name { flex: 1; font-size: 14.5px; }

    /* ===== 移动端：侧边栏变抽屉 ===== */
    .mobile-bar {
      display: none;
      align-items: center; gap: 12px;
      padding: 14px 16px; background: #fff;
      position: sticky; top: 0; z-index: 30;
    }
    .hamburger { font-size: 22px; background: none; border: none; cursor: pointer; color: #444; }
    .mobile-bar .mb-title { font-size: 18px; font-weight: 800; }

    .overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,.3); z-index: 90;
    }
    .overlay.show { display: block; }

    @media (max-width: 760px) {
      .layout { flex-direction: column; padding: 0; gap: 0; }
      .mobile-bar { display: flex; }
      .sidebar {
        position: fixed; left: 0; top: 0; bottom: 0;
        width: 250px; border-radius: 0; transform: translateX(-100%);
        transition: transform .2s; z-index: 100; overflow-y: auto;
      }
      .sidebar.open { transform: none; }
      .content { padding: 16px; }
      .all-grid { grid-template-columns: 1fr; }
    }

    /* 新建列表弹窗 */
    .modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,.25); z-index: 200;
      align-items: center; justify-content: center;
    }
    .modal-overlay.show { display: flex; }
    .modal-box {
      background: #fff; border-radius: 18px; padding: 24px;
      width: calc(100% - 48px); max-width: 340px;
    }
    .modal-box h3 { font-size: 17px; font-weight: 700; margin-bottom: 16px; }
    .modal-box input {
      width: 100%; border: 1.5px solid #ddd; border-radius: 10px;
      padding: 10px 12px; font-size: 15px; font-family: inherit;
      outline: none; margin-bottom: 16px;
    }
    .modal-box input:focus { border-color: var(--blue); }
    .modal-actions { display: flex; gap: 8px; justify-content: flex-end; }
    .modal-actions button {
      border: none; border-radius: 8px; padding: 8px 18px; font-size: 14px;
      font-family: inherit; font-weight: 600; cursor: pointer;
    }
  </style>
</head>
<body>
  <!-- 移动端顶部栏 -->
  <div class="mobile-bar">
    <button class="hamburger" onclick="toggleSidebar()">☰</button>
    <span class="mb-title">待办清单</span>
  </div>
  <div class="overlay" id="overlay" onclick="toggleSidebar()"></div>

  <div class="layout">
    <!-- 左侧侧边栏 -->
    <aside class="sidebar" id="sidebar">
      <div class="brand">待办<span class="dot">清单</span></div>

      <div class="nav-item" data-view="all" onclick="setView('all')">
        <span class="ni-ico">☰</span><span>全部列表</span>
      </div>
      <div class="nav-item" data-view="star" onclick="setView('star')">
        <span class="ni-ico">☆</span><span>星标</span>
        <span class="nav-badge" id="star-badge" style="display:none">0</span>
      </div>
      <div class="nav-item" data-view="plan" onclick="setView('plan')">
        <span class="ni-ico">📅</span><span>计划</span>
      </div>
      <div class="nav-item" data-view="settings" onclick="setView('settings')">
        <span class="ni-ico">⚙</span><span>设置</span>
      </div>

      <div class="side-divider"></div>
      <div class="side-label">我的列表</div>
      <div id="cat-nav-list"></div>

      <button class="new-cat-btn" onclick="showNewCatModal()">＋ 新建列表</button>
    </aside>

    <!-- 右侧主内容 -->
    <main class="content">
      <div class="content-head">
        <div class="content-title" id="content-title">全部列表</div>
        <button class="head-btn" onclick="showNewCatModal()">＋ 新建列表</button>
      </div>
      <div id="content-body"></div>
    </main>
  </div>

  <!-- 新建列表弹窗 -->
  <div class="modal-overlay" id="cat-modal">
    <div class="modal-box">
      <h3>新建列表</h3>
      <input type="text" id="new-cat-name" placeholder="输入列表名称…" autocomplete="off">
      <div class="modal-actions">
        <button class="btn-cancel" onclick="closeCatModal()">取消</button>
        <button class="btn-ok" onclick="confirmNewCat()">创建</button>
      </div>
    </div>
  </div>

  <script>
    const STORAGE_KEY = "todo_categories";
    function load() {
      try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
      catch(e) { return []; }
    }
    function save(d) { localStorage.setItem(STORAGE_KEY, JSON.stringify(d)); }
    let cats = load();
    let currentView = "all"; // all | catId | star | plan | settings

    // ---- 统计 ----
    const catDone = c => c.tasks.filter(t => t.done).length;
    const favCount = () => cats.reduce((s,c) => s + c.tasks.filter(t=>t.fav).length, 0);

    function updateBadge() {
      const b = document.getElementById("star-badge");
      const n = favCount();
      if (n > 0) { b.textContent = n; b.style.display = "flex"; }
      else b.style.display = "none";
    }

    // ---- 构造任务行 ----
    function makeTaskRow(catId, t) {
      const row = document.createElement("div");
      row.className = "t-row" + (t.done ? " done" : "");

      const radio = document.createElement("div");
      radio.className = "radio" + (t.done ? " checked" : "");
      radio.onclick = () => toggleDone(catId, t.id);

      const body = document.createElement("div");
      body.className = "t-body";
      body.innerHTML = `<div class="t-title">${esc(t.title)}</div>`;
      if (t.note) body.innerHTML += `<div class="t-sub">${esc(t.note)}</div>`;

      const right = document.createElement("div");
      right.className = "t-right";
      const star = document.createElement("button");
      star.className = "star-btn" + (t.fav ? " fav" : "");
      star.textContent = t.fav ? "★" : "☆";
      star.onclick = () => toggleFav(catId, t.id);
      const del = document.createElement("button");
      del.className = "del-btn"; del.textContent = "×";
      del.onclick = () => removeTask(catId, t.id);
      right.appendChild(star); right.appendChild(del);

      row.appendChild(radio); row.appendChild(body); row.appendChild(right);
      return row;
    }

    // ---- 构造分类卡片（含添加区） ----
    function makeCatCard(cat, expandAdd) {
      const card = document.createElement("div");
      card.className = "cat-card";

      const head = document.createElement("div");
      head.className = "card-head";
      head.innerHTML =
        `<span class="card-icon">☰</span>` +
        `<span class="card-name">${esc(cat.name)}</span>` +
        `<span class="card-count">${catDone(cat)}/${cat.tasks.length}</span>` +
        `<span class="card-arrow">›</span>`;
      card.appendChild(head);

      const tList = document.createElement("div");
      tList.className = "task-list";
      if (cat.tasks.length === 0) {
        tList.innerHTML = '<div style="padding:12px 4px;color:#b0bcc8;font-size:13px;">暂无任务</div>';
      } else {
        cat.tasks.forEach(t => tList.appendChild(makeTaskRow(cat.id, t)));
      }
      card.appendChild(tList);

      const addBtn = document.createElement("button");
      addBtn.className = "add-task-btn";
      addBtn.textContent = "＋ 添加待办";
      addBtn.onclick = () => toggleAddInput(cat.id);
      card.appendChild(addBtn);

      const wrap = document.createElement("div");
      wrap.className = "add-input-wrap" + (expandAdd ? " show" : "");
      wrap.id = "add-wrap-" + cat.id;
      wrap.innerHTML =
        `<input class="add-input" id="ti-${cat.id}" placeholder="任务标题" autocomplete="off">` +
        `<input class="add-note" id="tn-${cat.id}" placeholder="备注 / 链接（可选）" autocomplete="off">` +
        `<div class="add-confirm"><button class="btn-cancel" onclick="toggleAddInput(${cat.id})">取消</button><button class="btn-ok" onclick="confirmTask(${cat.id})">确定</button></div>`;
      card.appendChild(wrap);

      return card;
    }

    // ---- 渲染侧边栏我的列表 ----
    function renderSidebar() {
      const list = document.getElementById("cat-nav-list");
      list.innerHTML = "";
      if (cats.length === 0) {
        list.innerHTML = '<div style="padding:6px 12px;color:#ccc;font-size:13px;">还没有列表</div>';
      }
      cats.forEach(cat => {
        const item = document.createElement("div");
        item.className = "cat-nav" + (currentView === cat.id ? " active" : "");
        item.onclick = () => setView(cat.id);
        item.innerHTML =
          `<span>☰</span><span class="cn-name">${esc(cat.name)}</span>` +
          `<span class="cn-num">${cat.tasks.length}</span>`;
        list.appendChild(item);
      });
      // nav 高亮
      document.querySelectorAll(".nav-item").forEach(n =>
        n.classList.toggle("active", n.dataset.view === currentView));
    }

    // ---- 渲染主内容 ----
    function renderMain() {
      const titleEl = document.getElementById("content-title");
      const body = document.getElementById("content-body");
      body.innerHTML = "";

      if (currentView === "settings") {
        titleEl.textContent = "设置";
        body.innerHTML = `<div class="settings-box">
          <p>所有数据存储在浏览器本地 localStorage 中。<br>清除浏览器数据会丢失全部记录。</p>
          <button onclick="if(confirm('确定清空所有数据？')){localStorage.removeItem('${STORAGE_KEY}');cats=[];renderAll()}">清空所有数据</button>
        </div>`;
        return;
      }

      if (currentView === "star") {
        titleEl.textContent = "星标";
        const favs = [];
        cats.forEach(c => c.tasks.filter(t => t.fav).forEach(t => favs.push({cat, t})));
        if (favs.length === 0) {
          body.innerHTML = '<div class="empty-hint">暂无星标任务<br>在任务右侧点 ☆ 即可收藏</div>';
        } else {
          favs.forEach(({cat, t}) => body.appendChild(makeCatCard({id:cat.id, name:cat.name, tasks:[t]})));
        }
        return;
      }

      if (currentView === "plan") {
        titleEl.textContent = "计划";
        let undone = [], done = [];
        cats.forEach(c => c.tasks.forEach(t => { t.done ? done.push(t) : undone.push(t); }));
        const groups = [
          { label: "进行中", items: undone, color: "var(--blue)" },
          { label: "已完成", items: done, color: "#aaa" }
        ];
        groups.forEach(g => {
          const st = document.createElement("div");
          st.className = "section-title"; st.style.color = g.color;
          st.textContent = g.label + "  " + g.items.length;
          body.appendChild(st);
          if (g.items.length === 0) {
            const r = document.createElement("div");
            r.className = "plan-row"; r.style.opacity = ".5";
            r.innerHTML = `<span style="color:#bbb">无待办</span>`;
            body.appendChild(r);
          } else {
            g.items.forEach(t => {
              const r = document.createElement("div");
              r.className = "plan-row";
              r.innerHTML =
                `<div class="radio${t.done?' checked':''}" onclick="quickToggle(${t.id})"></div>` +
                `<div class="plan-name"${t.done?' style="text-decoration:line-through;color:#bbb"':''}>${esc(t.title)}</div>`;
              body.appendChild(r);
            });
          }
        });
        return;
      }

      if (currentView === "all") {
        titleEl.textContent = "全部列表";
        if (cats.length === 0) {
          body.innerHTML = '<div class="empty-hint">还没有列表<br>点击右上角「新建列表」创建一个吧 ✨</div>';
          return;
        }
        const grid = document.createElement("div");
        grid.className = "all-grid";
        cats.forEach(c => grid.appendChild(makeCatCard(c)));
        // 添加列表卡片
        const nl = document.createElement("div");
        nl.className = "new-list-card";
        nl.onclick = showNewCatModal;
        nl.innerHTML = '<div class="plus-big">＋</div><span>添加列表</span>';
        grid.appendChild(nl);
        body.appendChild(grid);
        return;
      }

      // 单个分类视图
      const cat = cats.find(c => c.id === currentView);
      if (!cat) { setView("all"); return; }
      titleEl.textContent = cat.name;
      body.appendChild(makeCatCard(cat));
    }

    // ---- 渲染入口 ----
    function renderAll() { renderSidebar(); renderMain(); updateBadge(); }

    // ---- 交互 ----
    function setView(v) {
      currentView = v;
      toggleSidebar(false);
      renderAll();
      // 滚动到顶部
      window.scrollTo({top: 0, behavior: "smooth"});
    }

    function toggleAddInput(catId) {
      const w = document.getElementById("add-wrap-" + catId);
      if (!w) return;
      const show = !w.classList.contains("show");
      document.querySelectorAll(".add-input-wrap.show").forEach(x => x.classList.remove("show"));
      if (show) {
        w.classList.add("show");
        setTimeout(() => document.getElementById("ti-" + catId)?.focus(), 50);
      }
    }

    function confirmTask(catId) {
      const ti = document.getElementById("ti-" + catId);
      const tn = document.getElementById("tn-" + catId);
      const title = ti.value.trim();
      if (!title) return;
      const cat = cats.find(c => c.id === catId);
      if (!cat) return;
      cat.tasks.push({ id: Date.now(), title, note: tn.value.trim(), done: false, fav: false });
      save(cats); renderAll();
    }

    function showNewCatModal() {
      document.getElementById("cat-modal").classList.add("show");
      setTimeout(() => document.getElementById("new-cat-name").focus(), 80);
    }
    function closeCatModal() { document.getElementById("cat-modal").classList.remove("show"); }

    function confirmNewCat() {
      const name = document.getElementById("new-cat-name").value.trim();
      if (!name) return;
      cats.push({ id: Date.now(), name, tasks: [] });
      save(cats); closeCatModal(); renderAll();
    }
    document.getElementById("new-cat-name").addEventListener("keydown", e => {
      if (e.key === "Enter") confirmNewCat();
    });

    function toggleDone(catId, taskId) {
      const cat = cats.find(c => c.id === catId);
      const t = cat && cat.tasks.find(t => t.id === taskId);
      if (t) t.done = !t.done;
      save(cats); renderAll();
    }
    function quickToggle(taskId) {
      for (const c of cats) {
        const t = c.tasks.find(x => x.id === taskId);
        if (t) { t.done = !t.done; save(cats); renderAll(); return; }
      }
    }
    function toggleFav(catId, taskId) {
      const cat = cats.find(c => c.id === catId);
      const t = cat && cat.tasks.find(t => t.id === taskId);
      if (t) t.fav = !t.fav;
      save(cats); renderAll();
    }
    function removeTask(catId, taskId) {
      const cat = cats.find(c => c.id === catId);
      if (cat) cat.tasks = cat.tasks.filter(t => t.id !== taskId);
      save(cats); renderAll();
    }

    // 移动端抽屉
    function toggleSidebar(force) {
      if (window.innerWidth > 760) return;
      const sb = document.getElementById("sidebar");
      const ov = document.getElementById("overlay");
      const open = force === undefined ? !sb.classList.contains("open") : force;
      sb.classList.toggle("open", open);
      ov.classList.toggle("show", open);
    }

    function esc(s) {
      const d = document.createElement("div");
      d.textContent = s; return d.innerHTML;
    }

    renderAll();
  </script>
</body>
</html>
